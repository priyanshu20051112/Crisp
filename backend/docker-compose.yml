services:

  web:
    build: .
    container_name: flask_app

    ports:
      - "5000:5000"

    depends_on:
      - db
      - redis

    env_file:
      - .env

  db:
    image: postgres:17
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Notyourtype@1
      POSTGRES_DB: url_shortner

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_server

    ports:
      - "6379:6379"

volumes:
  postgres_data: